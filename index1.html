<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .box{
            margin: 5px;
            padding: 10px;
            border: 3px solid black;
            height: 300px;
            box-sizing: border-box;
            margin:10px 15px 20px 25px;
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
            font-size:30px ;
            font-style: oblique;
            font-weight: 200;
            text-decoration: dotted;
            text-align: center;
            text-transform: uppercase;
            text-decoration-color: blue;
            text-decoration-style: inherit;
            text-decoration-thickness: 45px;
            text-indent: 50px;
            text-overflow: ellipsis;
            overflow: hidden;
            line-height: 4;
            letter-spacing: 25px; 
            color: rgb(176, 120, 150);
        }
        .box1{
            color: brown;
        }
    </style>
</head>
<body>
    <p class="box box1">Lorem ipsum dolor sit amet consectetur adipisicing elit. Odio, qui.</p>
</body>
</html>
