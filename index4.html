<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow</title>
    <style>
        .shadow{
            border: 4px solid black;
            box-shadow: 4px 6px 14px 5px pink ;
            text-shadow: 5px 5px 15px blue;
            outline: 5px dotted blue;
            outline-offset: 5px;
            display:inline-block;
            border-radius: 50px;
        }
        .list{
            display: list-item;
            text-align:center;
            list-style: armenian;
            list-style-position: inside;
            background-color: blue;
            border: 2px solid black;
        }
    </style>
</head>
<body>
    <div class="shadow">I am a box</div>
    <div class="list">
        <li>about</li>
        <li>HOME</li>
    </div>
</body>
</html>
